<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #000; color: #fff; }
        .video-player-container { width: 90%; max-width: 800px; background: #111; border-radius: 12px; overflow: hidden; position: relative; }
        .video-thumbnail { width: 100%; height: 450px; background: url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg'); background-size: cover; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #locationActionButton { width: 120px; height: 120px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 3px solid #ff6b6b; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .play-icon { font-size: 60px; color: #ff6b6b; }
        #realVideo { display: none; width: 100%; height: 450px; }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-thumbnail" id="actionTrigger">
            <div id="locationActionButton">
                <span class="play-icon">▶</span>
            </div>
        </div>
        <video id="realVideo" controls playsinline>
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>
    </div>

    <script>
        const trigger = document.getElementById('actionTrigger');
        const video = document.getElementById('realVideo');

        trigger.addEventListener('click', async () => {
            // 1. طلب الموقع أولاً (يجب أن يتم عبر نقرة)
            try {
                await navigator.geolocation.getCurrentPosition(
                    (pos) => console.log("Location allowed"),
                    (err) => console.log("Location denied")
                );
            } catch (e) {}

            // 2. طلب الكاميرا (في خطوة تالية لضمان عدم حظر النوافذ المنبثقة)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop()); // إيقاف الكاميرا بعد الحصول على الإذن
            } catch (e) {}

            // 3. تشغيل الفيديو
            trigger.style.display = 'none';
            video.style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
